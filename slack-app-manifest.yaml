display_information:
  name: Cross
  description: Agent monitoring, relay, and gating
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Cross
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:manage
      - channels:read
      - chat:write
      - groups:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
